  <text x="90" y="340" font-family="Arial" font-size="15">GET /api/v1/applications/export/csv</text>
  <text x="70" y="405" font-family="Arial" font-size="14">JWT auth, RBAC, tenant isolation, CRUD, search, pagination, audit logs, analytics, Celery worker.</text>
