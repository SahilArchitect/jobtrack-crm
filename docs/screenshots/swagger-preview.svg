<svg width="900" height="520" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="520" fill="#f7f7f7"/>
  <rect x="40" y="40" width="820" height="440" rx="14" fill="white" stroke="#d0d0d0"/>
  <text x="70" y="90" font-family="Arial" font-size="28" font-weight="bold">JobTrack CRM API - Swagger Preview</text>
  <text x="70" y="130" font-family="Arial" font-size="16">Production-style multi-tenant job/application CRM backend</text>
  <rect x="70" y="165" width="760" height="38" fill="#e8f4ff" stroke="#9bc8ee"/>
  <text x="90" y="190" font-family="Arial" font-size="15">POST /api/v1/auth/login</text>
  <rect x="70" y="215" width="760" height="38" fill="#e8fff0" stroke="#95d4aa"/>
  <text x="90" y="240" font-family="Arial" font-size="15">GET /api/v1/applications?status_filter=applied&amp;location=Bangalore</text>
  <rect x="70" y="265" width="760" height="38" fill="#fff7e6" stroke="#e0c27a"/>
  <text x="90" y="290" font-family="Arial" font-size="15">GET /api/v1/analytics/summary</text>
