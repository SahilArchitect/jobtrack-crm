services:
  api:
    build: .
    container_name: jobtrack_api
    env_file:
      - .env
    command: scripts/start_api.sh
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app

  worker:
    build: .
    container_name: jobtrack_worker
    env_file:
      - .env
    command: scripts/start_worker.sh
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app

  db:
    image: postgres:16-alpine
    container_name: jobtrack_db
    environment:
      POSTGRES_USER: jobtrack
      POSTGRES_PASSWORD: jobtrack
      POSTGRES_DB: jobtrack
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobtrack -d jobtrack"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jobtrack_redis
    ports:
      - "6380:6379"

volumes:
  postgres_data:
